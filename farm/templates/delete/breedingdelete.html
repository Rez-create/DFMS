{% extends "partials/base.html" %}
{% load static %}

{% block content %}
<div class="main-content">
  <section class="section">
    <div class="section-body">
      <div class="card delete-confirm-card">
        <div class="card-header">
          <i class="fas fa-exclamation-triangle"></i>
          <h4>Are you sure you want to delete this record?</h4>
        </div>
        <div class="card-body">
          <p class="detail-label">Cow Name</p>
          <p class="detail-value">{{ breeding_record.cow_name }}</p>
          <p class="detail-label">Breeding Date</p>
          <p class="detail-value">{{ breeding_record.breeding_date }}</p>
        </div>
        <div class="card-footer">
          <form method="POST" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
          </form>
          <a href="{% url 'core:breeding' %}" class="btn btn-secondary">Cancel</a>
          <p class="text-muted">This action cannot be undone.</p>
        </div>
      </div>
    </div>
  </section>
</div>
{% endblock content %}
